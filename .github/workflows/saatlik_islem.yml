name: Saatlik SEO Guncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4

      - name: Python Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri Doğrudan Yükle
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml pandas
          # Eğer başka özel bir kütüphane (örn: selenium) kullanıyorsan buraya ekle

      - name: Python Betigini Calistir
        run: python seo_saldiri.py

      - name: Netlify'a Yukle
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './' 
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
