name: Saatlik SEO Guncelleme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

# 1. ADIM: Node.js 24 uyarısını susturmak için bu ortam değişkenini ekledik
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run_script:
    runs-on: ubuntu-latest
    steps:
      # 2. ADIM: v4.x sürümünün en güncel alt yapısını kullandığından emin oluyoruz
      - name: Depoyu Kontrol Et
        uses: actions/checkout@v4 

      # 3. ADIM: v4 yerine v5 kullanarak Node 20 bağımlılığından kurtuluyoruz
      - name: Python'ı Kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gereksinimleri Yukle
        run: |
          pip install -r requirements.txt

      - name: Python Betigini Calistir
        run: python seo_saldiri.py

      # 4. ADIM: Netlify aksiyonunu v3.0 sürümüne çekiyoruz
      - name: Netlify'a Yukle
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: './' 
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ https://ferzan-ozpetek-archive.netlify.app }}
